apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: three-tier-ingress
  namespace: three-tier
spec:
  ingressClassName: nginx
  rules:
  - host: threetierapp.duckdns.org
    http:
      paths:
      # 🔥 API FIRST (IMPORTANT)
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api
            port:
              number: 3500

      # 🔥 FRONTEND SECOND
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 3000
